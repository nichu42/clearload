name: Deploy Release to Bunny.net

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-deploy:
    runs-on: codeberg-medium
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Dictionary Validation
        run: npm test

      - name: Build and Push Docker Image
        run: |
          podman build -t codeberg.org/${{ github.repository_owner }}/clearload:${{ github.ref_name }} -t codeberg.org/${{ github.repository_owner }}/clearload:latest -f ./Dockerfile .
          podman login codeberg.org -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          podman push codeberg.org/${{ github.repository_owner }}/clearload:${{ github.ref_name }}
          podman push codeberg.org/${{ github.repository_owner }}/clearload:latest

name: Deploy Release to Bunny.net

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Dictionary Validation
        run: npm test

      - name: Log in to Codeberg Package Registry
        uses: docker/login-action@v3
        with:
          registry: codeberg.org
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            codeberg.org/${{ github.repository }}:${{ github.ref_name }}
            codeberg.org/${{ github.repository }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/clearload:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/clearload:latest

      - name: Trigger Bunny.net Rolling Update
        uses: BunnyWay/actions/container-update-image@main
        with:
          app_id: ${{ secrets.BUNNY_APP_ID }}
          api_key: ${{ secrets.BUNNY_API_KEY }}
          container: "clearload"
          image_tag: "${{ github.ref_name }}"

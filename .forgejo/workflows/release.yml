name: Deploy Release to Bunny.net

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Dictionary Validation
        run: npm test

      - name: Install Buildah and QEMU
        # qemu-user-static registers binfmt_misc handlers (via its .deb postinst) so the
        # amd64 runner can execute arm64 binaries — required to build the linux/arm64 image
        # under emulation. The Dockerfile does no native compilation (only rm/npm ci/chown),
        # so emulation overhead is small.
        run: apt-get update && apt-get install buildah ca-certificates qemu-user-static -y

      - name: Build and Push Multi-Arch Manifest (amd64 + arm64)
        env:
          BUILDAH_ISOLATION: chroot
          IMAGE: "ghcr.io/${{ github.repository_owner }}/clearload"
          TAG: "${{ github.ref_name }}"
        run: |
          # Configure buildah storage to use vfs inside the container to prevent hanging
          printf '[storage]\ndriver="vfs"\nrunroot="/run/containers/storage"\ngraphroot="/var/lib/containers/storage"\n' | tee /etc/containers/storage.conf
          buildah login -u "${{ github.actor }}" -p "${{ secrets.PACKAGE_TOKEN }}" ghcr.io

          # Build both architectures into a single local manifest list.
          # --jobs=1 builds arches sequentially to keep peak memory low (the
          # Playwright base image is ~2GB; parallel vfs builds OOM the runner).
          buildah build --jobs=1 \
            --platform=linux/amd64,linux/arm64 \
            --manifest "clearload:${TAG}" \
            --file Dockerfile .

          # Push the manifest list (and all per-arch images) under the version tag and latest.
          buildah manifest push --all "clearload:${TAG}" "docker://${IMAGE}:${TAG}"
          buildah manifest push --all "clearload:${TAG}" "docker://${IMAGE}:latest"
